<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reduse — Second Hand Mode Schweiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://js.stripe.com/v3/"></script>
<style>
:root{
  --pine:       #1b3a2d;
  --pine-deep:  #0f2418;
  --pine-mid:   #264d3b;
  --pine-hover: #1f4535;
  --silver:     #d4ddd8;
  --silver-dim: #8fa89e;
  --silver-pale:#e8efec;
  --accent:     #a8c4b8;
  --border-c:   rgba(212,221,216,.1);
  --border-m:   rgba(212,221,216,.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--pine);color:var(--silver);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.45}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:var(--pine-deep);border-bottom:1px solid var(--border-c);height:68px;display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:600;letter-spacing:.06em;color:var(--silver);display:flex;align-items:baseline;gap:.1em;flex-shrink:0}
.nav-logo .dot{color:var(--accent);font-size:2rem;line-height:1}
.nav-center{display:flex;gap:2rem}
.nav-link{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--silver-dim);cursor:pointer;border:none;background:none;font-family:'Jost',sans-serif;font-weight:400;transition:color .2s;padding:0}
.nav-link:hover{color:var(--silver)}
.nav-actions{display:flex;align-items:center;gap:.6rem}
.lang-switcher{display:flex;align-items:center;border:1px solid var(--border-c);border-radius:2px;overflow:hidden}
.lang-btn{background:transparent;border:none;padding:.32rem .65rem;font-family:'Jost',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-dim);cursor:pointer;transition:all .18s;border-right:1px solid var(--border-c)}
.lang-btn:last-child{border-right:none}
.lang-btn:hover{color:var(--silver);background:rgba(212,221,216,.07)}
.lang-btn.active{background:var(--accent);color:var(--pine-deep);font-weight:600}
.icon-btn{position:relative;width:38px;height:38px;border-radius:2px;background:transparent;border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;font-size:1rem;color:var(--silver-dim)}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:var(--pine-deep);width:17px;height:17px;border-radius:50%;font-size:.6rem;font-weight:700;display:none;align-items:center;justify-content:center;font-family:'Jost',sans-serif}
/* Profile nav button — può mostrare foto o iniziali */
.profile-nav-btn{width:38px;height:38px;border-radius:50%;background:var(--pine-mid);border:1.5px solid var(--border-m);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;overflow:hidden;flex-shrink:0}
.profile-nav-btn:hover{border-color:var(--accent)}
.profile-nav-btn img{width:100%;height:100%;object-fit:cover}
.profile-nav-btn span{font-family:'Cormorant Garamond',serif;font-size:.9rem;font-weight:600;color:var(--silver)}

.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1.3rem;border-radius:2px;font-family:'Jost',sans-serif;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn-ghost{background:transparent;border:1px solid var(--border-m);color:var(--silver-dim)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-silver{background:var(--silver);color:var(--pine-deep)}
.btn-silver:hover{background:var(--silver-pale)}
.btn-accent{background:var(--accent);color:var(--pine-deep)}
.btn-accent:hover{opacity:.85}
.btn-stripe{background:#635bff;color:#fff}
.btn-stripe:hover{background:#7a73ff}
.btn-stripe:disabled{background:#3a3660;color:rgba(255,255,255,.4);cursor:not-allowed}

/* ── HERO ── */
.hero{background:var(--pine-deep);padding:6rem 2.5rem 5rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid var(--border-c)}
.hero::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% 110%,rgba(168,196,184,.08) 0%,transparent 65%)}
.hero-eyebrow{display:inline-flex;align-items:center;gap:.6rem;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:2rem}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:block;width:28px;height:1px;background:var(--accent);opacity:.5}
.hero h1{font-family:'Cormorant Garamond',serif;font-size:clamp(3.2rem,8vw,6.5rem);font-weight:300;color:var(--silver);line-height:1.05;letter-spacing:-.01em;position:relative;z-index:1}
.hero h1 em{font-style:italic;color:var(--accent)}
.hero-sub{margin:1.8rem auto 0;max-width:480px;font-size:.9rem;line-height:1.75;color:var(--silver-dim);letter-spacing:.02em;font-weight:300;position:relative;z-index:1}
.ch-badge{display:inline-flex;align-items:center;gap:.4rem;margin-top:1.8rem;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--silver-dim);border:1px solid var(--border-m);padding:.4rem 1rem;border-radius:2px}
.search-wrap{margin:2.8rem auto 0;max-width:540px;display:flex;border:1px solid var(--border-m);background:rgba(255,255,255,.03);border-radius:2px;overflow:hidden;transition:border-color .2s;position:relative;z-index:1}
.search-wrap:focus-within{border-color:var(--accent)}
.search-wrap input{flex:1;padding:.85rem 1.4rem;background:transparent;border:none;outline:none;font-family:'Jost',sans-serif;font-size:.88rem;color:var(--silver);letter-spacing:.03em}
.search-wrap input::placeholder{color:var(--silver-dim);opacity:.6}
.search-wrap button{background:var(--accent);color:var(--pine-deep);border:none;padding:.85rem 1.6rem;font-family:'Jost',sans-serif;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:background .2s}
.search-wrap button:hover{background:var(--silver-pale)}
.hero-stats{display:flex;justify-content:center;gap:4rem;margin-top:4rem;position:relative;z-index:1}
.hero-stat .num{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:600;color:var(--silver);line-height:1}
.hero-stat .lbl{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--silver-dim);margin-top:.3rem}

/* ── MAIN ── */
.main{max-width:1280px;margin:0 auto;padding:3rem 2.5rem}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.8rem}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:600;color:var(--silver);letter-spacing:.01em}
.cats{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:2.5rem}
.cat-pill{padding:.4rem 1.1rem;border-radius:2px;border:1px solid var(--border-c);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--silver-dim);font-family:'Jost',sans-serif;background:transparent}
.cat-pill:hover{border-color:var(--silver-dim);color:var(--silver)}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:var(--pine-deep)}
#resultCount{font-size:.75rem;color:var(--silver-dim);letter-spacing:.05em}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1px;background:var(--border-c);border:1px solid var(--border-c)}
.listing-card{background:var(--pine);cursor:pointer;position:relative;transition:background .2s}
.listing-card:hover{background:var(--pine-hover)}
.listing-img{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;font-size:4.5rem;position:relative;overflow:hidden;background:var(--pine-mid)}
.listing-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.listing-img::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(15,36,24,.7) 0%,transparent 45%);pointer-events:none}
.listing-badge{position:absolute;top:.8rem;left:.8rem;z-index:2;background:var(--accent);color:var(--pine-deep);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;padding:.2rem .65rem}
.fav-btn{position:absolute;top:.7rem;right:.7rem;z-index:2;background:rgba(15,36,24,.55);border:1px solid var(--border-m);width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;backdrop-filter:blur(4px);transition:all .2s;color:var(--silver-dim)}
.fav-btn:hover,.fav-btn.active{background:rgba(15,36,24,.9);color:#e07070}
.listing-body{padding:.9rem 1rem 1.1rem}
.listing-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--silver);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.15rem;letter-spacing:.01em}
.listing-brand{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-dim);margin-bottom:.5rem}
.listing-meta{display:flex;align-items:center;justify-content:space-between}
.listing-price{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--accent)}
.listing-location{font-size:.68rem;color:rgba(212,221,216,.35);letter-spacing:.06em}

/* ── OVERLAYS & MODALS ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(15,36,24,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:1rem}
.overlay.open{display:flex}
.modal{background:var(--pine-deep);border:1px solid var(--border-m);max-width:620px;width:100%;max-height:92vh;overflow-y:auto;padding:0;position:relative;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-close{position:absolute;top:1rem;right:1rem;z-index:10;background:rgba(15,36,24,.7);border:1px solid var(--border-m);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;color:var(--silver-dim)}
.modal-close:hover{color:var(--silver)}

/* Item modal photos */
.modal-photos{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--pine-mid)}
.modal-photos img{width:100%;height:100%;object-fit:cover;display:none}
.modal-photos img.active{display:block}
.modal-photos .no-photo{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem}
.modal-photos::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--pine-deep) 0%,transparent 50%);pointer-events:none}
.photo-nav{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);display:flex;gap:.4rem;z-index:2}
.photo-dot{width:6px;height:6px;border-radius:50%;background:rgba(212,221,216,.4);cursor:pointer;transition:background .2s;border:none}
.photo-dot.active{background:var(--silver)}
.modal-body{padding:1.5rem 2rem 2rem}
.modal-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
.modal-tag{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--border-c);color:var(--silver-dim);padding:.2rem .7rem}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--silver);margin-bottom:.2rem;line-height:1.2}
.modal-brand{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.modal-price{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:600;color:var(--accent);margin-bottom:1.2rem}
.modal-desc{font-size:.86rem;line-height:1.8;color:var(--silver-dim);margin-bottom:1.5rem;font-weight:300}
.modal-divider{height:1px;background:var(--border-c);margin:1.2rem 0}
.seller-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem;cursor:pointer;padding:.6rem;border:1px solid transparent;border-radius:2px;transition:border-color .2s,background .2s}
.seller-row:hover{border-color:var(--border-m);background:rgba(168,196,184,.05)}
.seller-avatar{width:42px;height:42px;border-radius:50%;background:var(--pine-mid);border:1px solid var(--border-m);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--silver);flex-shrink:0;overflow:hidden}
.seller-avatar img{width:100%;height:100%;object-fit:cover}
.seller-name{font-size:.88rem;font-weight:500;color:var(--silver)}
.seller-rating{font-size:.72rem;color:var(--silver-dim);letter-spacing:.04em;margin-top:.15rem}
.seller-view-hint{font-size:.65rem;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-top:.2rem}
.modal-actions{display:flex;gap:.8rem}
.modal-actions .btn{flex:1;justify-content:center;padding:.75rem;font-size:.72rem}

/* ── SELL MODAL ── */
.sell-title-bar{padding:1.5rem 2rem 0;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--silver);margin-bottom:1.5rem}
.sell-body{padding:0 2rem 2rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{margin-bottom:1rem;position:relative}
.form-group label{display:block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;font-weight:400}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:.7rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border-c);border-radius:2px;font-family:'Jost',sans-serif;font-size:.88rem;color:var(--silver);outline:none;transition:border-color .2s}
.form-group select option{background:var(--pine-deep)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(212,221,216,.25)}
.form-group textarea{resize:vertical;min-height:80px}
.photo-upload-area{border:1.5px dashed var(--border-m);border-radius:2px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
.photo-upload-area:hover,.photo-upload-area.drag-over{border-color:var(--accent);background:rgba(168,196,184,.05)}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-upload-icon{font-size:2rem;margin-bottom:.5rem}
.photo-upload-hint{font-size:.78rem;color:var(--silver-dim);letter-spacing:.04em}
.photo-upload-hint span{color:var(--accent)}
.photo-previews{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.photo-thumb{position:relative;width:72px;height:72px;border-radius:2px;overflow:hidden;border:1px solid var(--border-m)}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb-remove{position:absolute;top:2px;right:2px;background:rgba(15,36,24,.85);border:none;width:18px;height:18px;border-radius:50%;font-size:.6rem;cursor:pointer;color:var(--silver);display:flex;align-items:center;justify-content:center}
.city-autocomplete{position:relative}
.city-dropdown{position:absolute;top:100%;left:0;right:0;z-index:50;background:var(--pine-deep);border:1px solid var(--border-m);border-top:none;max-height:180px;overflow-y:auto;display:none}
.city-dropdown.open{display:block}
.city-option{padding:.55rem 1rem;font-size:.85rem;color:var(--silver-dim);cursor:pointer;transition:background .15s}
.city-option:hover,.city-option.focused{background:var(--pine-mid);color:var(--silver)}
.city-match{color:var(--accent)}

/* ── MESSAGE MODAL ── */
.msg-modal{max-width:480px}
.msg-header{padding:1.8rem 2rem 1rem;border-bottom:1px solid var(--border-c)}
.msg-header h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver);margin-bottom:.2rem}
.msg-to{font-size:.75rem;color:var(--silver-dim);letter-spacing:.06em}
.msg-body{padding:1.5rem 2rem 2rem}
.msg-textarea{width:100%;min-height:130px;padding:.85rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border-c);border-radius:2px;font-family:'Jost',sans-serif;font-size:.9rem;color:var(--silver);outline:none;resize:vertical;transition:border-color .2s}
.msg-textarea:focus{border-color:var(--accent)}
.msg-textarea::placeholder{color:rgba(212,221,216,.25)}

/* ── SELLER PROFILE MODAL ── */
.seller-profile-modal{max-width:560px}
.seller-profile-hero{background:var(--pine-mid);padding:2.5rem 2rem 1.8rem;display:flex;align-items:center;gap:1.5rem;border-bottom:1px solid var(--border-c)}
.seller-profile-avatar{width:70px;height:70px;border-radius:50%;background:var(--pine-deep);border:2px solid var(--border-m);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--silver);flex-shrink:0;overflow:hidden}
.seller-profile-avatar img{width:100%;height:100%;object-fit:cover}
.seller-profile-name{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:600;color:var(--silver);margin-bottom:.2rem}
.seller-profile-meta{font-size:.75rem;color:var(--silver-dim);line-height:1.7}
.seller-profile-bio{font-size:.82rem;color:var(--silver-dim);font-style:italic;margin-top:.4rem;line-height:1.5}
.seller-profile-stats{display:flex;gap:1.5rem;margin-top:.8rem}
.seller-profile-stat .sv{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--accent)}
.seller-profile-stat .sl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-dim)}
.seller-profile-body{padding:1.5rem 2rem 2rem}
.seller-listings-title{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.seller-listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem}
.seller-listing-thumb{aspect-ratio:3/4;border-radius:2px;overflow:hidden;background:var(--pine-mid);cursor:pointer;position:relative;transition:opacity .2s}
.seller-listing-thumb:hover{opacity:.8}
.seller-listing-thumb img,.seller-listing-thumb .thumb-emoji{width:100%;height:100%;object-fit:cover}
.seller-listing-thumb .thumb-emoji{display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.seller-listing-thumb .slabel{position:absolute;bottom:0;left:0;right:0;padding:.4rem .5rem;background:linear-gradient(to top,rgba(15,36,24,.85),transparent);font-size:.62rem;color:var(--silver-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seller-listing-thumb .sprice{color:var(--accent);font-weight:500}
.seller-msg-btn{width:100%;justify-content:center;padding:.75rem;margin-top:1.2rem;font-size:.75rem}

/* ── EDIT PROFILE MODAL ── */
/* z-index 400 → sopra i side-panel (301) e il loro overlay (300) */
#editProfileOverlay{z-index:400}
.edit-profile-modal{max-width:520px}
.edit-profile-header{padding:1.8rem 2rem 1rem;border-bottom:1px solid var(--border-c)}
.edit-profile-header h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver)}
.edit-profile-body{padding:1.5rem 2rem 2rem}

/* Avatar upload in edit profile */
.avatar-upload-row{display:flex;align-items:center;gap:1.5rem;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border-c)}
.avatar-preview-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.avatar-preview{width:72px;height:72px;border-radius:50%;background:var(--pine-mid);border:2px solid var(--border-m);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver);overflow:hidden;cursor:pointer;transition:border-color .2s}
.avatar-preview:hover{border-color:var(--accent)}
.avatar-preview img{width:100%;height:100%;object-fit:cover}
.avatar-change-hint{font-size:.72rem;color:var(--silver-dim);line-height:1.6}
.avatar-change-hint span{color:var(--accent);cursor:pointer}
.avatar-change-hint span:hover{text-decoration:underline}
#avatarFileInput{display:none}

/* ── PANEL OVERLAY + SIDE PANELS ── */
.panel-overlay{position:fixed;inset:0;z-index:300;background:rgba(15,36,24,.65);backdrop-filter:blur(3px);display:none}
.panel-overlay.open{display:block}
.side-panel{position:fixed;top:0;right:-440px;bottom:0;width:400px;max-width:100vw;background:var(--pine-deep);border-left:1px solid var(--border-m);z-index:301;transition:right .32s cubic-bezier(.4,0,.2,1);overflow-y:auto;display:flex;flex-direction:column}
.side-panel.open{right:0}
.side-panel-header{display:flex;justify-content:space-between;align-items:center;padding:1.8rem 1.5rem 1.2rem;border-bottom:1px solid var(--border-c)}
.side-panel-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--silver)}
.side-panel-close{background:none;border:1px solid var(--border-c);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;color:var(--silver-dim)}
.side-panel-close:hover{color:var(--silver)}

/* User profile panel */
.profile-panel-hero{padding:1.5rem;border-bottom:1px solid var(--border-c);display:flex;align-items:center;gap:1.2rem}
.profile-panel-avatar{width:58px;height:58px;border-radius:50%;background:var(--pine-mid);border:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--silver);flex-shrink:0;overflow:hidden}
.profile-panel-avatar img{width:100%;height:100%;object-fit:cover}
.profile-panel-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:var(--silver)}
.profile-panel-sub{font-size:.72rem;color:var(--silver-dim);margin-top:.2rem;letter-spacing:.04em}
.profile-panel-bio{font-size:.8rem;color:var(--silver-dim);font-style:italic;margin-top:.35rem;line-height:1.5}
.profile-edit-btn{margin-top:.7rem;font-size:.68rem;padding:.3rem .85rem}
.profile-stats-row{display:flex;border-bottom:1px solid var(--border-c)}
.profile-stat-box{flex:1;padding:1rem;text-align:center;border-right:1px solid var(--border-c)}
.profile-stat-box:last-child{border-right:none}
.profile-stat-box .pv{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver)}
.profile-stat-box .pl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--silver-dim);margin-top:.2rem}
.profile-section{padding:1.2rem 1.5rem}
.profile-section-label{font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.9rem}
.profile-listing-row{display:flex;gap:.8rem;align-items:center;padding:.7rem 0;border-bottom:1px solid var(--border-c);cursor:pointer}
.profile-listing-row:hover .profile-listing-title{color:var(--accent)}
.profile-listing-img{width:44px;height:56px;background:var(--pine-mid);border-radius:2px;overflow:hidden;flex-shrink:0}
.profile-listing-img img{width:100%;height:100%;object-fit:cover}
.profile-listing-emoji{width:44px;height:56px;background:var(--pine-mid);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0}
.profile-listing-info{flex:1;min-width:0}
.profile-listing-title{font-family:'Cormorant Garamond',serif;font-size:.92rem;font-weight:600;color:var(--silver);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.profile-listing-price{font-size:.78rem;color:var(--accent);margin-top:.15rem}

/* Favourites panel */
.fav-item{display:flex;gap:.9rem;align-items:center;padding:.9rem 0;border-bottom:1px solid var(--border-c);cursor:pointer}
.fav-item:hover .fav-item-name{color:var(--accent)}
.fav-item-img{width:52px;height:68px;background:var(--pine-mid);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden;border-radius:2px}
.fav-item-img img{width:100%;height:100%;object-fit:cover}
.fav-item-info{flex:1;min-width:0}
.fav-item-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--silver);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
.fav-item-price{font-size:.8rem;color:var(--accent);margin-top:.2rem}
.fav-remove{background:none;border:none;color:#e07070;cursor:pointer;font-size:.9rem;flex-shrink:0}
.fav-empty{text-align:center;padding:3rem 0;font-size:.82rem;color:var(--silver-dim);letter-spacing:.08em;text-transform:uppercase}

/* Cart panel */
.cart-panel{width:380px;max-width:100vw}
.cart-header{display:flex;justify-content:space-between;align-items:center;padding:1.8rem 1.5rem 1.2rem;border-bottom:1px solid var(--border-c)}
.cart-title{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--silver)}
.cart-close{background:none;border:1px solid var(--border-c);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;color:var(--silver-dim)}
.cart-close:hover{color:var(--silver)}
.cart-inner{flex:1;padding:0 1.5rem;overflow-y:auto}
.cart-item{display:flex;gap:.9rem;align-items:center;padding:.9rem 0;border-bottom:1px solid var(--border-c)}
.cart-item-img{width:52px;height:68px;background:var(--pine-mid);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--silver);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{font-size:.8rem;color:var(--accent);margin-top:.2rem}
.cart-remove{background:none;border:none;color:var(--silver-dim);cursor:pointer;font-size:.9rem}
.cart-remove:hover{color:var(--accent)}
.cart-footer{padding:1.2rem 1.5rem;border-top:1px solid var(--border-m)}
.cart-total-row{display:flex;justify-content:space-between;align-items:center;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--silver);margin-bottom:1rem}
.cart-empty{text-align:center;padding:3rem 0;font-size:.82rem;color:var(--silver-dim);letter-spacing:.08em;text-transform:uppercase}

/* ── STRIPE ── */
.stripe-modal{max-width:480px}
.stripe-header{padding:2rem 2rem 1.2rem;border-bottom:1px solid var(--border-c)}
.stripe-header h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver);margin-bottom:.3rem}
.stripe-header .stripe-amount{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--accent)}
.stripe-header .stripe-items-count{font-size:.75rem;color:var(--silver-dim);letter-spacing:.06em;margin-top:.15rem}
.stripe-body{padding:1.5rem 2rem 2rem}
.stripe-field-label{display:block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;font-weight:400}
.stripe-input{width:100%;padding:.7rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border-c);border-radius:2px;font-family:'Jost',sans-serif;font-size:.88rem;color:var(--silver);outline:none;transition:border-color .2s;margin-bottom:1rem}
.stripe-input:focus{border-color:var(--accent)}
.stripe-input::placeholder{color:rgba(212,221,216,.3)}
.stripe-element-wrap{margin-bottom:1rem}
.stripe-element-label{display:block;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem;font-weight:400}
#stripe-card-element{padding:.75rem 1rem;background:rgba(255,255,255,.04);border:1px solid var(--border-c);border-radius:2px;transition:border-color .2s;min-height:42px}
#stripe-card-element.StripeElement--focus{border-color:var(--accent)}
#stripe-card-element.StripeElement--invalid{border-color:#e53e3e}
#stripe-card-error{color:#e07070;font-size:.78rem;margin-top:.4rem;min-height:1.1em}
.stripe-secure{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--silver-dim);margin-bottom:1.2rem;opacity:.7}
.stripe-test-note{background:rgba(99,91,255,.1);border:1px solid rgba(99,91,255,.25);border-radius:2px;padding:.65rem 1rem;font-size:.72rem;color:rgba(212,221,216,.7);margin-bottom:1.2rem;line-height:1.5}
.stripe-test-note code{color:#a5a0ff}
.stripe-submit{width:100%;justify-content:center;padding:.85rem;font-size:.78rem;letter-spacing:.14em}
.stripe-submit .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:.5rem}
.stripe-submit.loading .spinner{display:block}
.stripe-submit.loading .btn-label{opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}
.stripe-logo{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1rem;font-size:.68rem;color:var(--silver-dim);opacity:.5}
.success-modal{max-width:420px;text-align:center}
.success-body{padding:3rem 2rem}
.success-icon{font-size:3.5rem;margin-bottom:1.2rem}
.success-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;color:var(--silver);margin-bottom:.8rem}
.success-sub{font-size:.88rem;color:var(--silver-dim);line-height:1.7;margin-bottom:1.8rem}
.success-ref{font-size:.72rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}

/* HOW */
.how{background:var(--pine-deep);border-top:1px solid var(--border-c);border-bottom:1px solid var(--border-c);padding:5rem 2.5rem;text-align:center}
.how-inner{max-width:960px;margin:0 auto}
.how-label{font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem}
.how h2{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--silver);margin-bottom:3.5rem;font-style:italic}
.steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:2.5rem}
.step-num{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:rgba(168,196,184,.18);line-height:1;margin-bottom:.7rem}
.step h3{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--silver);margin-bottom:.4rem}
.step p{font-size:.8rem;line-height:1.65;color:var(--silver-dim);font-weight:300}
footer{background:var(--pine-deep);border-top:1px solid var(--border-c);padding:2.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;color:var(--silver)}
.footer-copy{font-size:.72rem;color:var(--silver-dim);letter-spacing:.08em}
.footer-ch{font-size:.72rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.toast{position:fixed;bottom:2.5rem;left:50%;transform:translateX(-50%);background:var(--pine-deep);border:1px solid var(--border-m);color:var(--silver);padding:.7rem 1.8rem;font-size:.78rem;letter-spacing:.08em;z-index:600;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── DISCOVERY TOOLS ── */
.discovery-tools{display:grid;grid-template-columns:1.2fr .8fr;gap:1rem;align-items:start;margin-bottom:1.4rem}
.filters-card,.sort-card{border:1px solid var(--border-c);background:rgba(255,255,255,.03);padding:1rem;border-radius:2px}
.filters-head,.sort-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
.filters-title,.sort-title{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
.filters-reset{background:none;border:none;color:var(--silver-dim);font-size:.72rem;cursor:pointer}
.filters-reset:hover{color:var(--silver)}
.filters-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem}
.filter-group label{display:block;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--silver-dim);margin-bottom:.45rem}
.filter-group select,.sort-select{width:100%;padding:.68rem .85rem;background:rgba(255,255,255,.04);border:1px solid var(--border-c);color:var(--silver);font-family:'Jost',sans-serif;font-size:.82rem;border-radius:2px}
.filter-group select option,.sort-select option{background:var(--pine-deep)}
.price-slider-wrap{grid-column:span 2}
.price-values{display:flex;justify-content:space-between;font-size:.76rem;color:var(--silver);margin-bottom:.45rem}
.range-dual{position:relative;height:34px}
.range-track{position:absolute;top:14px;left:0;right:0;height:4px;background:rgba(212,221,216,.12);border-radius:999px}
.range-fill{position:absolute;top:14px;height:4px;background:var(--accent);border-radius:999px}
.range-dual input[type=range]{position:absolute;left:0;top:6px;width:100%;pointer-events:none;-webkit-appearance:none;background:none}
.range-dual input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--silver);border:none;pointer-events:auto;cursor:pointer}
.range-dual input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--silver);border:none;pointer-events:auto;cursor:pointer}
.range-dual input[type=range]::-webkit-slider-runnable-track{height:4px;background:transparent}
.range-dual input[type=range]::-moz-range-track{height:4px;background:transparent}
.sort-card p{font-size:.78rem;line-height:1.6;color:var(--silver-dim);margin-bottom:.8rem}
.listing-topline{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.35rem}
.listing-views{font-size:.64rem;color:rgba(212,221,216,.45);letter-spacing:.06em}
.listing-badge.boosted{background:#f4d58d;color:var(--pine-deep)}
.boost-chip{display:inline-flex;align-items:center;gap:.35rem;padding:.18rem .55rem;border:1px solid rgba(244,213,141,.35);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:#f4d58d}
.profile-listing-actions{display:flex;gap:.45rem;align-items:center}
.profile-mini-btn{background:none;border:1px solid var(--border-c);padding:.28rem .5rem;color:var(--silver-dim);font-size:.64rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}
.profile-mini-btn:hover{border-color:var(--accent);color:var(--accent)}
.profile-mini-btn.active{border-color:#f4d58d;color:#f4d58d}
.listing-share-link{font-size:.7rem;color:var(--silver-dim);margin-top:.9rem;word-break:break-all}
.listing-share-link a{color:var(--accent);text-decoration:none}
.notification-item{padding:1rem 0;border-bottom:1px solid var(--border-c)}
.notification-item.unread .notification-title{color:var(--silver)}
.notification-title{font-size:.82rem;color:var(--silver-dim);line-height:1.5}
.notification-meta{font-size:.65rem;color:rgba(212,221,216,.4);letter-spacing:.08em;text-transform:uppercase;margin-top:.3rem}
.notification-empty{text-align:center;padding:3rem 0;font-size:.82rem;color:var(--silver-dim);letter-spacing:.08em;text-transform:uppercase}
.notification-item.clickable{cursor:pointer;transition:background .18s,border-color .18s;padding:1rem .2rem 1rem 0}
.notification-item.clickable:hover{background:rgba(168,196,184,.05)}
.notification-link-hint{font-size:.62rem;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;margin-top:.45rem}
.boost-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.8rem 1rem;border:1px solid var(--border-c);margin-bottom:1rem;background:rgba(255,255,255,.03)}
.boost-payment-modal{max-width:720px}
.boost-payment-header{padding:1.7rem 2rem 1rem;border-bottom:1px solid var(--border-c)}
.boost-payment-header h3{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--silver);font-weight:600}
.boost-payment-sub{font-size:.8rem;color:var(--silver-dim);margin-top:.35rem;line-height:1.6}
.boost-payment-body{padding:1.5rem 2rem 2rem}
.boost-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:1.2rem}
.boost-select-box,.boost-plan-box,.boost-summary-box{border:1px solid var(--border-c);background:rgba(255,255,255,.03);padding:1rem}
.boost-box-title{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem}
.boost-item-option{display:flex;align-items:flex-start;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border-c)}
.boost-item-option:last-child{border-bottom:none;padding-bottom:0}
.boost-item-option input{margin-top:.25rem}
.boost-item-meta strong{display:block;font-size:.84rem;color:var(--silver);font-weight:500}
.boost-item-meta span{font-size:.73rem;color:var(--silver-dim);line-height:1.55}
.boost-plan{display:flex;align-items:flex-start;gap:.7rem;padding:.8rem;border:1px solid var(--border-c);margin-bottom:.7rem;cursor:pointer;transition:border-color .18s,background .18s}
.boost-plan:hover,.boost-plan.active{border-color:var(--accent);background:rgba(168,196,184,.06)}
.boost-plan:last-child{margin-bottom:0}
.boost-plan strong{display:block;font-size:.84rem;color:var(--silver)}
.boost-plan span{font-size:.72rem;color:var(--silver-dim);line-height:1.55}
.boost-summary-row{display:flex;justify-content:space-between;gap:1rem;font-size:.8rem;color:var(--silver-dim);padding:.35rem 0}
.boost-summary-row.total{margin-top:.45rem;padding-top:.8rem;border-top:1px solid var(--border-c);font-size:1rem;color:var(--silver)}
.boost-summary-row.total strong{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--accent);font-weight:600}
.boost-discount-note{margin-top:.55rem;font-size:.68rem;color:var(--accent);letter-spacing:.06em;line-height:1.5}
.boost-payment-actions{display:flex;gap:.8rem;margin-top:1.2rem}
@media(max-width:760px){.boost-grid{grid-template-columns:1fr}}
.boost-row-copy{font-size:.8rem;color:var(--silver-dim);line-height:1.55}
.boost-row-copy strong{color:var(--silver)}
.switch{position:relative;width:46px;height:26px;flex-shrink:0}
.switch input{display:none}
.slider-switch{position:absolute;inset:0;background:rgba(212,221,216,.2);border-radius:999px;cursor:pointer;transition:.2s}
.slider-switch::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:var(--silver);border-radius:50%;transition:.2s}
.switch input:checked + .slider-switch{background:rgba(244,213,141,.4)}
.switch input:checked + .slider-switch::before{transform:translateX(20px);background:#f4d58d}
@media(max-width:768px){
  .discovery-tools{grid-template-columns:1fr}
  .filters-grid{grid-template-columns:1fr 1fr}
  .price-slider-wrap{grid-column:1/-1}
}

/* ── MOBILE ── */
@media(max-width:768px){
  /* Nav */
  nav{padding:0 1rem;height:58px}
  .nav-logo{font-size:1.4rem}
  .nav-center{display:none}
  .nav-actions{gap:.4rem}
  .lang-switcher{display:none}          /* nascosto su mobile — accessibile dal profilo */
  #btnSell{display:none}                /* il + Vendi sparisce dalla nav su mobile */
  .icon-btn{width:34px;height:34px;font-size:.9rem}
  .profile-nav-btn{width:34px;height:34px}

  /* Floating sell button su mobile */
  #fabSell{display:flex}

  /* Hero */
  .hero{padding:3.5rem 1.2rem 3rem}
  .hero h1{font-size:clamp(2.4rem,11vw,3.8rem)}
  .hero-sub{font-size:.85rem}
  .ch-badge{font-size:.65rem}
  .search-wrap{margin-top:1.8rem}
  .hero-stats{gap:1.5rem;margin-top:2.5rem}
  .hero-stat .num{font-size:1.6rem}
  .hero-stat .lbl{font-size:.6rem}

  /* Listings */
  .main{padding:2rem 1rem}
  .listings-grid{grid-template-columns:repeat(2,1fr)}

  /* Modals: full-screen su mobile */
  .overlay{padding:.5rem;align-items:flex-end}
  .modal{max-width:100%;width:100%;max-height:95vh;border-radius:2px 2px 0 0}
  .stripe-modal,.msg-modal,.edit-profile-modal,.seller-profile-modal,.success-modal{max-width:100%}

  /* Side panels: full-width */
  .side-panel{width:100%;right:-100%}
  .side-panel.open{right:0}

  /* Forms */
  .form-row{grid-template-columns:1fr}
  .sell-body{padding:0 1rem 1.5rem}
  .sell-title-bar{padding:1.2rem 1rem 0}
  .edit-profile-body{padding:1.2rem 1rem 1.5rem}
  .edit-profile-header{padding:1.2rem 1rem .8rem}
  .modal-body{padding:1.2rem 1rem 1.5rem}
  .stripe-body{padding:1.2rem 1rem 1.5rem}
  .stripe-header{padding:1.2rem 1rem .8rem}
  .seller-profile-hero{flex-direction:column;align-items:flex-start;padding:1.5rem 1rem}
  .seller-profile-body{padding:1rem}

  /* Seller grid */
  .seller-listings-grid{grid-template-columns:repeat(2,1fr)}

  /* Modal actions */
  .modal-actions{flex-direction:column}

  /* Cart */
  .cart-header,.side-panel-header,.profile-stats-row{padding:1.2rem 1rem}
  .cart-inner,.profile-section{padding:0 1rem}
  .cart-footer{padding:1rem}

  /* Hero stats */
  .hero-stats{gap:1.5rem}

  /* Footer */
  footer{flex-direction:column;text-align:center;padding:1.5rem 1rem}
}

/* Sell FAB (floating action button) su mobile */
#fabSell{
  display:none; /* mostrato solo su mobile via media query */
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;
  width:52px;height:52px;border-radius:50%;
  background:var(--accent);color:var(--pine-deep);
  border:none;font-size:1.6rem;cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(15,36,24,.5);
  transition:transform .2s,box-shadow .2s;
}
#fabSell:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(15,36,24,.7)}
</style>

<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">Reduse<span class="dot">·</span></div>
  <div class="nav-center">

/* ══ HELPERS ══ */
function T(k){return TR[lang][k]??k;}
function catLabel(v){const f=T('cats').find(c=>c.v===v);return f?f.l:v;}
function condLabel(i){return T('cond')[i]??T('cond')[0];}
function catKeyFromLabel(lbl){const f=T('cats').find(c=>c.l===lbl);return f?f.v:lbl;}
function cartTotal(){return cart.reduce((s,i)=>s+i.price,0);}
function myListings(){return listings.filter(l=>l.seller===MR_IDX);}
function formatTimeAgo(ts){
  const d=Math.max(1,Math.floor((Date.now()-ts)/60000));
  if(d<60)return d+' min';
  if(d<1440)return Math.floor(d/60)+' h';
  return Math.floor(d/1440)+' g';
}

/* ══ LISTINGS ══ */
function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const isAll=activeCat===T('all'),ak=isAll?null:catKeyFromLabel(activeCat);
  const minPrice=+document.getElementById('minPriceRange').value;
  const maxPrice=+document.getElementById('maxPriceRange').value;
  const size=document.getElementById('sizeFilter').value;
  const cond=document.getElementById('condFilter').value;
  const city=document.getElementById('cityFilter').value;
  let filtered=listings.filter(l=>(isAll||l.cat===ak)&&
    (l.title.toLowerCase().includes(q)||l.brand.toLowerCase().includes(q)||catLabel(l.cat).toLowerCase().includes(q)||l.city.toLowerCase().includes(q))&&
    l.price>=minPrice&&l.price<=maxPrice&&
    (size==='all'||l.size===size)&&
    (cond==='all'||String(l.cond)===cond)&&
    (city==='all'||l.city===city)
  );
  const sort=document.getElementById('sortSelect').value;
  filtered=filtered.sort((a,b)=>{
    if(a.boosted!==b.boosted) return a.boosted?-1:1;
    if(sort==='priceAsc') return a.price-b.price;
    if(sort==='priceDesc') return b.price-a.price;
    if(sort==='views') return b.views-a.views;
    return b.createdAt-a.createdAt;
  });
  return filtered;
}
function filterListings(){renderListings();}
function updatePriceLabels(){
  const min=+document.getElementById('minPriceRange').value;
  const max=+document.getElementById('maxPriceRange').value;
  document.getElementById('minPriceLabel').textContent=`CHF ${min}`;
  document.getElementById('maxPriceLabel').textContent=`CHF ${max}`;
  const fill=document.getElementById('priceRangeFill');
  fill.style.left=(min/MAX_PRICE*100)+'%';
  fill.style.right=(100-max/MAX_PRICE*100)+'%';
}
function updatePriceRange(which){
  const minEl=document.getElementById('minPriceRange');
  const maxEl=document.getElementById('maxPriceRange');
  if(+minEl.value > +maxEl.value-5){
    if(which==='min') minEl.value=maxEl.value-5;
    else maxEl.value=+minEl.value+5;
  }
  updatePriceLabels();
  filterListings();
}
function resetFilters(){
  document.getElementById('searchInput').value='';
  document.getElementById('minPriceRange').value=0;
  document.getElementById('maxPriceRange').value=MAX_PRICE;
  document.getElementById('sizeFilter').value='all';

  document.getElementById('editAvatarHint').innerHTML=T('editAvatarHint');

  // Valori correnti
  document.getElementById('editName').value=currentUser.name;
  document.getElementById('editEmail').value=currentUser.email;
  document.getElementById('editCity').value=currentUser.city;
  document.getElementById('editBio').value=currentUser.bio;

  // Avatar preview
  renderEditAvatarPreview();

  document.getElementById('editProfileOverlay').classList.add('open');
}
function renderEditAvatarPreview(){
  const el=document.getElementById('editAvatarPreview');
  if(currentUser.photo){
    el.innerHTML=`<img src="${currentUser.photo}" alt=""/>`;
    el.style.background='transparent';
  } else {
    el.innerHTML=`<span style="font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:600;color:var(--silver)">${userInitials()}</span>`;
    el.style.background='var(--pine-mid)';
  }
}
function handleAvatarUpload(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{currentUser.photo=ev.target.result;renderEditAvatarPreview();};
  r.readAsDataURL(f);
  e.target.value='';
}
function saveProfile(){
  const name=document.getElementById('editName').value.trim();
  const email=document.getElementById('editEmail').value.trim();
  const city=document.getElementById('editCity').value.trim();
  const bio=document.getElementById('editBio').value.trim();
  if(!name){showToast('⚠️ Nome obbligatorio');return;}
  currentUser.name=name;
  currentUser.email=email||currentUser.email;
  currentUser.city=city||currentUser.city;
  currentUser.bio=bio;
  closeEditProfileDirect();
  syncNavAvatar();
  renderProfilePanel();
  renderListings(); // aggiorna eventuali card con seller MR
  showToast(T('toastProfileSaved'));
}
function closeEditProfile(e){if(e.target.id==='editProfileOverlay')closeEditProfileDirect();}
function closeEditProfileDirect(){document.getElementById('editProfileOverlay').classList.remove('open');}

/* City autocomplete edit profile */
function editCityInput(){
  const val=document.getElementById('editCity').value.trim();editCityFocusIdx=-1;
  if(val.length<1){closeEditCityDD();return;}
  editCityOptions=SWISS_CITIES.filter(c=>c.toLowerCase().startsWith(val.toLowerCase())).slice(0,8);
  if(!editCityOptions.length){closeEditCityDD();return;}
  const hl=v=>v.replace(new RegExp(`^(${escRe(val)})`,'i'),m=>`<span class="city-match">${m}</span>`);
  const dd=document.getElementById('editCityDropdown');
  dd.innerHTML=editCityOptions.map(c=>`<div class="city-option" onmousedown="selectEditCity('${c}')">${hl(c)}</div>`).join('');
  dd.classList.add('open');
}
function selectEditCity(c){document.getElementById('editCity').value=c;closeEditCityDD();}
function closeEditCityDD(){document.getElementById('editCityDropdown').classList.remove('open');editCityFocusIdx=-1;}
function editCityBlur(){setTimeout(closeEditCityDD,150);}
function editCityKeyDown(e){
  const items=document.getElementById('editCityDropdown').querySelectorAll('.city-option');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();editCityFocusIdx=Math.min(editCityFocusIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();editCityFocusIdx=Math.max(editCityFocusIdx-1,0);}
  else if(e.key==='Enter'&&editCityFocusIdx>=0){e.preventDefault();selectEditCity(editCityOptions[editCityFocusIdx]);return;}
  else if(e.key==='Escape'){closeEditCityDD();return;}
  items.forEach((it,i)=>it.classList.toggle('focused',i===editCityFocusIdx));
  if(editCityFocusIdx>=0)items[editCityFocusIdx].scrollIntoView({block:'nearest'});
}

function toggleBoost(id){ openBoostPayment(id); }
function boostCurrentItem(){ if(currentItemId===null) return; openBoostPayment(currentItemId); }
function openBoostPayment(initialId){
  const mine=myListings();
  if(!mine.length) return;
  boostSelection=new Set();
  if(initialId) boostSelection.add(initialId);
  boostPlan='3';
  document.getElementById('boostPaymentTitle').textContent=T('boostPaymentTitle');
  document.getElementById('boostPaymentSub').textContent=T('boostPaymentSub');
  document.getElementById('boostItemsLabel').textContent=T('boostItemsLabel');
  document.getElementById('boostPlanLabel').textContent=T('boostPlanLabel');
  document.getElementById('boostSummaryLabel').textContent=T('boostSummaryLabel');
  document.getElementById('boostSummaryItemsText').textContent=T('boostSummaryItemsText');
  document.getElementById('boostSummaryPlanText').textContent=T('boostSummaryPlanText');
  document.getElementById('boostSummaryDiscountText').textContent=T('boostSummaryDiscountText');
  document.getElementById('boostSummaryTotalText').textContent=T('boostSummaryTotalText');
  document.getElementById('boostDiscountNote').textContent=T('boostDiscountNote');
  document.getElementById('boostCancelBtn').textContent=T('boostCancel');
  document.getElementById('boostConfirmBtn').textContent=T('boostConfirm');
  document.getElementById('boostItemOptions').innerHTML=mine.map(l=>`<label class="boost-item-option"><input type="checkbox" ${boostSelection.has(l.id)?'checked':''} onchange="toggleBoostSelection(${l.id},this.checked)" ${l.boosted?'disabled':''}><div class="boost-item-meta"><strong>${l.title}</strong><span>CHF ${l.price} · ${l.city}${l.boosted?' · già in boost':''}</span></div></label>`).join('');
  const plans=[['3',T('boostPlan3'),2.99],['7',T('boostPlan7'),5.49],['10',T('boostPlan10'),6.99]];
  document.getElementById('boostPlans').innerHTML=plans.map(([k,label,price])=>`<div class="boost-plan ${boostPlan===k?'active':''}" onclick="selectBoostPlan('${k}')"><input type="radio" name="boostPlan" ${boostPlan===k?'checked':''} onchange="selectBoostPlan('${k}')"><div><strong>${label}</strong><span>CHF ${price.toFixed(2)}</span></div></div>`).join('');
  updateBoostSummary();
  document.getElementById('boostOverlay').classList.add('open');
}
function toggleBoostSelection(id,checked){ if(checked) boostSelection.add(id); else boostSelection.delete(id); updateBoostSummary(); }
function selectBoostPlan(k){ boostPlan=String(k); const nodes=[...document.querySelectorAll('#boostPlans .boost-plan')]; nodes.forEach((el,idx)=>{ const map=['3','7','10']; el.classList.toggle('active',map[idx]===boostPlan); el.querySelector('input').checked=map[idx]===boostPlan; }); updateBoostSummary(); }
function updateBoostSummary(){
  const count=boostSelection.size; const price=BOOST_PLANS[boostPlan]||0; const subtotal=count*price; const discount=count>1?subtotal*0.10:0; const total=subtotal-discount;
  document.getElementById('boostSummaryItemsValue').textContent=String(count);
  document.getElementById('boostSummaryPlanValue').textContent=`CHF ${price.toFixed(2)}`;
  document.getElementById('boostSummaryDiscountValue').textContent=discount>0?`- CHF ${discount.toFixed(2)}`:'CHF 0.00';
  document.getElementById('boostSummaryTotalValue').textContent=`CHF ${total.toFixed(2)}`;
  document.getElementById('boostConfirmBtn').disabled=count===0;
}
function confirmBoostPayment(){
  const ids=[...boostSelection]; if(!ids.length) return;
  ids.forEach(id=>{ const item=listings.find(l=>l.id===id); if(item){ item.boosted=true; addNotification('boost',item.title,'item',item.id); } });
  closeBoostPaymentDirect();
  if(currentItemId!==null){ const l=listings.find(x=>x.id===currentItemId); if(l){ document.getElementById('modalBoostBtn').textContent=l.boosted?T('modalBoostActive'):T('modalBoost'); document.getElementById('modalBoostBtn').disabled=!!l.boosted; } }
  renderListings(); renderProfilePanel(); showToast(T('boostToastPaid'));
}
function closeBoostPayment(e){ if(e.target.id==='boostOverlay') closeBoostPaymentDirect(); }
function closeBoostPaymentDirect(){ document.getElementById('boostOverlay').classList.remove('open'); }

/* ══ CART ══ */
function addToCart(item){cart.push(item);updateCartUI();showToast(T('toastCart'));closeItemModal();}
function removeCart(i){cart.splice(i,1);updateCartUI();}
function updateCartUI(){
  const badge=document.getElementById('cartBadge');
  badge.style.display=cart.length?'flex':'none';badge.textContent=cart.length;
  const el=document.getElementById('cartItems'),footer=document.getElementById('cartFooter');
  if(!cart.length){el.innerHTML=`<div class="cart-empty">${T('cartEmpty')}</div>`;footer.style.display='none';return;}
  footer.style.display='block';
  el.innerHTML=cart.map((item,i)=>{
    const thumb=item.photos.length?`<img src="${item.photos[0]}" alt=""/>`:`${item.emoji}`;
    return `<div class="cart-item"><div class="cart-item-img">${thumb}</div>
      <div class="cart-item-info"><div class="cart-item-name">${item.title}</div><div class="cart-item-price">CHF ${item.price} · ${item.brand}</div></div>
      <button class="cart-remove" onclick="removeCart(${i})">✕</button></div>`;
  }).join('');
  document.getElementById('cartTotalLabel').textContent=T('cartTotalLabel');
  document.getElementById('btnCheckout').textContent=T('btnCheckout');
  document.getElementById('cartTotal').textContent='CHF '+cartTotal();
}
function openCart(){openPanel('cartPanel');}
function closeCart(){closePanel('cartPanel');}

/* ══ PANEL HELPERS ══ */
function openPanel(id){closeAllPanels();document.getElementById(id).classList.add('open');document.getElementById('panelOverlay').classList.add('open');}
function closePanel(id){document.getElementById(id).classList.remove('open');document.getElementById('panelOverlay').classList.remove('open');}
function closeAllPanels(){['cartPanel','favPanel','profilePanel','notifPanel'].forEach(id=>document.getElementById(id).classList.remove('open'));document.getElementById('panelOverlay').classList.remove('open');}

/* ══ STRIPE CHECKOUT ══ */
function openStripeCheckout(){
  const total=cartTotal();
  document.getElementById('stripeTitle').textContent=T('stripeTitle');
  document.getElementById('stripeAmount').textContent='CHF '+total;
  document.getElementById('stripeItemsCount').textContent=cart.length+' art.';
  document.getElementById('stripeEmailLabel').textContent=T('stripeEmailLabel');
  document.getElementById('stripeCardLabel').textContent=T('stripeCardLabel');
  document.getElementById('stripeSecureLabel').textContent=T('stripeSecureLabel');
  document.getElementById('stripeTestNote').innerHTML=T('stripeTestNote');
  document.getElementById('stripeSubmitLabel').textContent=T('stripeSubmitLabel')(total);
  document.getElementById('stripePoweredBy').textContent=T('stripePoweredBy');
  document.getElementById('stripe-card-error').textContent='';
  document.getElementById('stripeEmail').value='';
  if(stripe&&!cardMounted){
    const elements=stripe.elements({fonts:[{cssSrc:'https://fonts.googleapis.com/css2?family=Jost:wght@400&display=swap'}]});
    cardElement=elements.create('card',{style:{base:{fontFamily:"'Jost',sans-serif",fontSize:'15px',color:'#d4ddd8','::placeholder':{color:'rgba(212,221,216,0.35)'},iconColor:'#a8c4b8'},invalid:{color:'#e07070',iconColor:'#e07070'}},hidePostalCode:true});
    cardElement.mount('#stripe-card-element');
    cardElement.on('change',e=>{document.getElementById('stripe-card-error').textContent=e.error?e.error.message:'';});
    cardMounted=true;
  }
  document.getElementById('stripeOverlay').classList.add('open');closeAllPanels();
}
async function submitPayment(){
  const email=document.getElementById('stripeEmail').value.trim();
  if(!email||!email.includes('@')){showToast(T('toastEmailRequired'));return;}
  const btn=document.getElementById('stripeSubmitBtn');btn.classList.add('loading');btn.disabled=true;
  await new Promise(r=>setTimeout(r,1800));
  btn.classList.remove('loading');btn.disabled=false;
  closeStripeModal();
  const ref='RDS-'+Date.now().toString(36).toUpperCase().slice(-8);
  document.getElementById('successTitle').textContent=T('successTitle');
  document.getElementById('successSub').textContent=T('successSub');
  document.getElementById('successRef').textContent=T('successRef')(ref);
  document.getElementById('successOverlay').classList.add('open');
  cart=[];updateCartUI();
}
function closeStripe(e){if(e.target.id==='stripeOverlay')closeStripeModal();}
function closeStripeModal(){document.getElementById('stripeOverlay').classList.remove('open');}
function closeSuccess(e){if(e.target.id==='successOverlay')closeSuccessModal();}
function closeSuccessModal(){document.getElementById('successOverlay').classList.remove('open');}

/* ══ PHOTOS (sell) ══ */
function handlePhotos(e){
  const files=[...e.target.files],remaining=5-currentPhotos.length;
  files.slice(0,remaining).forEach(f=>{const r=new FileReader();r.onload=ev=>{currentPhotos.push(ev.target.result);renderPreviews();};r.readAsDataURL(f);});
  e.target.value='';
}
function removePhoto(i){currentPhotos.splice(i,1);renderPreviews();}
function renderPreviews(){
  document.getElementById('photoPreviews').innerHTML=currentPhotos.map((p,i)=>
    `<div class="photo-thumb"><img src="${p}" alt=""/><button class="photo-thumb-remove" onclick="removePhoto(${i})">✕</button></div>`
  ).join('');
  document.getElementById('photoUploadArea').style.opacity=currentPhotos.length>=5?'.5':'1';
}
document.addEventListener('DOMContentLoaded',()=>{
  const area=document.getElementById('photoUploadArea');
  area.addEventListener('dragover',e=>{e.preventDefault();area.classList.add('drag-over');});
  area.addEventListener('dragleave',()=>area.classList.remove('drag-over'));
  area.addEventListener('drop',e=>{
    e.preventDefault();area.classList.remove('drag-over');
    const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/')),remaining=5-currentPhotos.length;
    files.slice(0,remaining).forEach(f=>{const r=new FileReader();r.onload=ev=>{currentPhotos.push(ev.target.result);renderPreviews();};r.readAsDataURL(f);});
  });
});

/* ══ CITY AUTOCOMPLETE (sell) ══ */
function cityInput(){
  const val=document.getElementById('sellCity').value.trim();cityFocusIdx=-1;
  if(val.length<1){closeCityDropdown();return;}
  cityOptions=SWISS_CITIES.filter(c=>c.toLowerCase().startsWith(val.toLowerCase())).slice(0,8);
  if(!cityOptions.length){closeCityDropdown();return;}
  const hl=v=>v.replace(new RegExp(`^(${escRe(val)})`,'i'),m=>`<span class="city-match">${m}</span>`);
  const dd=document.getElementById('cityDropdown');
  dd.innerHTML=cityOptions.map(c=>`<div class="city-option" onmousedown="selectCity('${c}')">${hl(c)}</div>`).join('');
  dd.classList.add('open');
}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function selectCity(c){document.getElementById('sellCity').value=c;closeCityDropdown();}
function closeCityDropdown(){document.getElementById('cityDropdown').classList.remove('open');cityFocusIdx=-1;}
function cityBlur(){setTimeout(closeCityDropdown,150);}
function cityKeyDown(e){
  const items=document.getElementById('cityDropdown').querySelectorAll('.city-option');if(!items.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();cityFocusIdx=Math.min(cityFocusIdx+1,items.length-1);}
  else if(e.key==='ArrowUp'){e.preventDefault();cityFocusIdx=Math.max(cityFocusIdx-1,0);}
  else if(e.key==='Enter'&&cityFocusIdx>=0){e.preventDefault();selectCity(cityOptions[cityFocusIdx]);return;}
  else if(e.key==='Escape'){closeCityDropdown();return;}
  items.forEach((it,i)=>it.classList.toggle('focused',i===cityFocusIdx));
  if(cityFocusIdx>=0)items[cityFocusIdx].scrollIntoView({block:'nearest'});
}

/* ══ SELL ══ */
function openSell(){
  currentPhotos=[];renderPreviews();
  document.getElementById('sellBoost').checked=false;
  document.getElementById('sellOverlay').classList.add('open');
}
function closeSell(e){if(e.target.id==='sellOverlay')closeSellModal();}
function closeSellModal(){document.getElementById('sellOverlay').classList.remove('open');}
function publishItem(){
  const title=document.getElementById('sellTitle').value.trim();
  const brand=document.getElementById('sellBrand').value.trim()||'No brand';
  const price=parseFloat(document.getElementById('sellPrice').value);
  const size=document.getElementById('sellSize').value.trim()||'uni';
  const cat=document.getElementById('sellCat').value;
  const cond=document.getElementById('sellCond').selectedIndex;
  const desc=document.getElementById('sellDesc').value.trim()||T('defaultDesc');
  const city=document.getElementById('sellCity').value.trim();
  if(!currentPhotos.length){showToast(T('toastPhotos'));return;}
  if(!title||isNaN(price)||price<0||!city){showToast(T('toastRequired'));return;}
  /* ✅ seller = MR_IDX — l'annuncio appartiene all'utente loggato */
  const boosted=document.getElementById('sellBoost').checked;
  listings.unshift({id:Date.now(),photos:[...currentPhotos],emoji:'👗',title,brand,price,cat,cond,size,city,desc,seller:MR_IDX,boosted,views:0,createdAt:Date.now()});
  closeSellModal();activeCat=T('all');renderCats();applyTranslations();renderListings();renderProfilePanel();
  addNotification('publish',title);
  if(boosted) addNotification('boost',title);
  showToast(T('toastPublish'));
  ['sellTitle','sellBrand','sellPrice','sellSize','sellDesc','sellCity'].forEach(id=>document.getElementById(id).value='');
  currentPhotos=[];renderPreviews();
}

/* ══ TOAST ══ */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}

resetFilters();

if(initialItem) setTimeout(()=>openItem(Number(initialItem),true),0);
